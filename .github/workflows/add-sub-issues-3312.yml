name: Add sub-issues to #3312

on:
  workflow_dispatch:
  push:
    branches:
      - 'copilot/add-sub-issues-for-3312'
    paths:
      - '.github/workflows/add-sub-issues-3312.yml'

permissions:
  issues: write

jobs:
  add-sub-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Add issues tagged "generate spec" or "scanner" as sub-issues of #3312
        uses: actions/github-script@v7
        with:
          script: |
            const owner = 'go-swagger';
            const repo = 'go-swagger';
            const parentIssueNumber = 3312;

            // Collect all open issues with either label, deduplicating by issue number
            async function listIssuesByLabel(label) {
              return github.paginate(github.rest.issues.listForRepo, {
                owner,
                repo,
                labels: label,
                state: 'open',
                per_page: 100,
              });
            }

            const [genSpecIssues, scannerIssues] = await Promise.all([
              listIssuesByLabel('generate spec'),
              listIssuesByLabel('scanner'),
            ]);

            // Deduplicate by issue number, exclude the parent issue itself
            const seen = new Set();
            const issues = [];
            for (const issue of [...genSpecIssues, ...scannerIssues]) {
              if (issue.number !== parentIssueNumber && !seen.has(issue.number)) {
                seen.add(issue.number);
                issues.push(issue);
              }
            }

            console.log(`Found ${issues.length} unique issues to add as sub-issues of #${parentIssueNumber}`);

            let added = 0;
            let skipped = 0;
            let failed = 0;

            for (const issue of issues) {
              try {
                await github.request(
                  'POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                  {
                    owner,
                    repo,
                    issue_number: parentIssueNumber,
                    sub_issue_id: issue.id,
                    headers: {
                      'X-GitHub-Api-Version': '2022-11-28',
                    },
                  }
                );

                console.log(`✓ Added #${issue.number} as sub-issue`);
                added++;
              } catch (error) {
                if (error.status === 422) {
                  // Already a sub-issue or other validation error
                  console.log(`- Skipped #${issue.number}: ${error.message}`);
                  skipped++;
                } else {
                  console.log(`✗ Failed to add #${issue.number}: ${error.status} ${error.message}`);
                  failed++;
                }
              }

              // Small delay to avoid secondary rate limiting
              await new Promise(r => setTimeout(r, 100));
            }

            console.log(`\nSummary: ${added} added, ${skipped} skipped, ${failed} failed`);
