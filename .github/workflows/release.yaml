name: Release

permissions:
  contents: read

on:
  push:
    tags:
      - 'v*'

env:
  CLOUDSMITH_REPO: go-swagger/go-swagger

jobs:
  update-doc:
    name: Build documentation site
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/update-doc.yaml

  docker-release:
    name: Docker with release tag
    needs: [update-doc]
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/build-docker.yaml
    with:
      push: true
      tagged: true
      latest: true
      record_retention: 90
    secrets:
      CR_PAT: ${{ secrets.CR_PAT }}
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASS: ${{ secrets.QUAY_PASS }}

  publish-release:
    name: Publish release
    needs: [docker-release]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
      -
        name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "stable"
          check-latest: true
          cache: true
      -
        name: Install UPX
        uses: crazy-max/ghaction-upx@c83f378efc804f828e988debb88ed6116feb2368 # v4.0.0
        with:
          install-only: true
      -
        name: UPX version
        run: upx --version
      -
        name: Install git-cliff
        uses: taiki-e/install-action@a2352fc6ce487f030a3aa709482d57823eadfb37 # v2.75.16
        with:
          tool: git-cliff
      -
        name: Import GPG key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.CI_BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.CI_BOT_GPG_PASSPHRASE }}
          fingerprint: ${{ secrets.CI_BOT_SIGNING_KEY }}E9627BC5E152A7EA657ADB7732475DCD662E8EED
      -
        name: Verify installed GPG keys
        run: |
           gpg --list-keys --with-subkey-fingerprints --keyid-format long || true
      -
        name: Write GPG key file for nfpm
        # nfpm uses Go's openpgp library which cannot handle DSA keys or subkey-only exports.
        # A standalone RSA signing key (GPG_NFPM_KEY) is used specifically for deb/rpm signing.
        id: gpg-key-file
        env:
          GPG_NFPM_KEY: ${{ secrets.GPG_NFPM_KEY }}
        run: |
          GPG_NFPM_KEY_FILE="$(mktemp -t gpg-key-XXXXXX.asc)"
          printenv GPG_NFPM_KEY > "${GPG_NFPM_KEY_FILE}"
          echo "path=${GPG_NFPM_KEY_FILE}" >> "${GITHUB_OUTPUT}"

          # Verify the content of the key file
          gpg --list-packets "${GPG_NFPM_KEY_FILE}" 2>&1 || true
          wc -l "${GPG_NFPM_KEY_FILE}"
      -
        name: Extract tag message
        id: tag-message
        run: |
          set -x

          git fetch --unshallow origin 2>/dev/null || true
          git fetch origin +refs/tags/*:refs/tags/*
          MESSAGE=$(git tag -l "${GITHUB_REF_NAME}" --format='%(contents:subject)

          %(contents:body)
          ')
          export MESSAGE
          {
            echo "message<<EOF"
            printenv MESSAGE
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

          echo "Message in git tag ${GITHUB_REF_NAME}"
          echo "$MESSAGE"
      -
        name: Generate release notes
        run: |
          git cliff \
            --config .cliff.toml \
            --latest \
            --with-tag-message "${{ steps.tag-message.outputs.message }}" \
            --output /tmp/release-notes.md

          # log the release notes for inspection & debug
          cat /tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Build release
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: "~> v2"
          args: release --clean --release-notes /tmp/release-notes.md --fail-fast
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.CI_BOT_GPG_PASSPHRASE }}
          GPG_NFPM_KEY_FILE: ${{ steps.gpg-key-file.outputs.path }}
          GPG_FINGERPRINT: ${{ steps.import-gpg.outputs.fingerprint }}
          DISCORD_WEBHOOK_ID: ${{ secrets.DISCORD_RELEASE_WEBHOOK_ID }}
          DISCORD_WEBHOOK_TOKEN: ${{ secrets.DISCORD_RELEASE_WEBHOOK_TOKEN }}
      -
        name: Install CloudSmith CLI
        if: ${{ env.CLOUDSMITH_API_KEY != '' }}
        uses: cloudsmith-io/cloudsmith-cli-action@18665afcce9f859312b61989671af9af7402e4fb # v2.0.2
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}
      -
        name: Push RPM package to CloudSmith
        if: ${{ env.CLOUDSMITH_API_KEY != '' }}
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: >
          cloudsmith push rpm --verbose
          ${{ env.CLOUDSMITH_REPO }}/any-distro/any-version
          dist/swagger-*.x86_64*.rpm
      -
        name: Push Deb package to CloudSmith
        if: ${{ env.CLOUDSMITH_API_KEY != '' }}
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: >
          cloudsmith push deb --verbose
          ${{ env.CLOUDSMITH_REPO }}/any-distro/any-version
          dist/swagger-*.x86_64*.deb
