#
# Phase 2 of the examples PR cleanup pipeline.
#
# Triggered by workflow_run after the "Close examples" workflow completes.
# Downloads the close-examples artifact produced by phase 1 and closes the
# corresponding child PR on go-swagger/examples (branch regen/pr-<N>) so we
# do not accumulate orphan PRs there.
#
# Security model: this workflow never checks out or executes PR code. It runs
# on the default branch with the base-repo secret context (workflow_run),
# which is why the bot-credentials token exchange succeeds here but fails in
# a fork-triggered pull_request_target job.

name: Close examples PR

permissions:
  contents: read
  actions: read

on:
  workflow_run:
    workflows: ["Close examples"]
    types:
      - completed

jobs:
  close-examples-pr:
    # description: |
    #   Download the phase-1 artifact, mint bot credentials, and close the
    #   corresponding examples PR (and its branch).
    name: close examples PR
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request_target'
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      -
        name: Download close metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        id: download
        with:
          name: close-examples
          path: /tmp/close-metadata
          run-id: ${{ github.event.workflow_run.id }}
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}
        continue-on-error: true
      -
        name: Sanitize artifacts
        id: check
        run: |
          if [ ! -f /tmp/close-metadata/pr_number.txt ]; then
            echo "::notice title=close examples::No close metadata artifact; nothing to do"
            echo "has_artifacts=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          PR_NUMBER=$(cat /tmp/close-metadata/pr_number.txt)
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]] ; then
            echo "::error title=close examples::Invalid PR number in artifact: ${PR_NUMBER}"
            exit 1
          fi

          echo "has_artifacts=true" >> "${GITHUB_OUTPUT}"
          echo "pr_number=${PR_NUMBER}" >> "${GITHUB_OUTPUT}"
      -
        name: Configure bot credentials
        if: ${{ steps.check.outputs.has_artifacts == 'true' }}
        uses: go-openapi/gh-actions/ci-jobs/bot-credentials@b0542d87f701a2fdba9629421026a2bdd54e2859 # v1.4.15
        id: bot-credentials
        with:
          enable-github-app: "true"
          github-app-id: ${{ secrets.CI_BOT_APP_ID }}
          github-app-private-key: ${{ secrets.CI_BOT_APP_PRIVATE_KEY }}
          github-app-owner: go-swagger
          github-app-repositories: examples
          enable-gpg-signing: "false"
          enable-commit-signing: "false"
          enable-tag-signing: "false"
      -
        name: Close corresponding examples PR
        if: ${{ steps.check.outputs.has_artifacts == 'true' }}
        env:
          GH_TOKEN: ${{ steps.bot-credentials.outputs.app-token }}
          PR_NUMBER: ${{ steps.check.outputs.pr_number }}
        run: |
          BRANCH="regen/pr-${PR_NUMBER}"
          EXISTING=$(gh pr list --repo go-swagger/examples --head "${BRANCH}" --json number --jq '.[0].number // empty')
          if [ -n "${EXISTING}" ]; then
            gh pr close "${EXISTING}" --repo go-swagger/examples --delete-branch \
              --comment "Closing: triggering go-swagger PR #${PR_NUMBER} was closed without merge."
            echo "::notice title=close examples::Closed examples PR #${EXISTING} (branch ${BRANCH})"
          else
            echo "::notice title=close examples::No open examples PR for branch ${BRANCH}"
          fi
