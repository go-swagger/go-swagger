name: Lint

permissions:
  contents: read
  pull-requests: read

# description: |
#   Standalone golangci-lint runner.
#
#   The project ships a `.golangci.yml` (v2 config) and golangci-lint is
#   also invoked from the monolithic test workflow, but there is no
#   dedicated lint workflow. This workflow gives lint its own status
#   check, lets maintainers trigger it on demand via `workflow_dispatch`,
#   and isolates lint feedback from the longer-running test jobs.

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

# Cancel any in-flight run for the same ref when a new commit lands.
concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Originating repo checkout (e.g. public fork)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # will be empty on push to master and default to head from master
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          check-latest: true
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          # The .golangci.yml in the repo is schema "version: 2";
          # golangci-lint v2 is required to consume that schema.
          version: v2.1.6
          args: --verbose
          only-new-issues: true
