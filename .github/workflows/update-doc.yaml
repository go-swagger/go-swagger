name: update-doc

permissions:
  contents: read

on:
  workflow_call:

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build-doc:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: '1'
          submodules: recursive
          sparse-checkout: |
            hack/
            docs/
      -
        name: Get all tags (go-swagger repo)
        if: ${{ github.repository == 'go-swagger/go-swagger' }}
        run: |
          git fetch origin --prune --update-shallow --tags 'refs/tags/*:refs/tags/*'
      -
        name: Get all tags (fork)
        if: ${{ github.repository != 'go-swagger/go-swagger' }}
        run: |
          git remote add upstream "https://github.com/go-swagger/go-swagger"
          git fetch upstream --prune --update-shallow --tags 'refs/tags/*:refs/tags/*'
          git fetch origin --prune --update-shallow --tags 'refs/tags/*:refs/tags/*'
      -
        name: Initialize themes
        run: |
          (cd hack/doc-site/hugo/ && git clone --branch v9 https://github.com/alex-shpak/hugo-book themes/hugo-book)
      -
        name: Prepare config
        run: |
          # Builds a commit-dependant extra config to inject parameterization.
          # HUGO doesn't support config from the command line.
          #
          # Set go-swagger specific parameters that are used in some parameterized documents
          # This is used to keep up-to-date installation instructions.
          #
          # TODO(fredbi):
          #
          # Support a versioned doc site with latest master and up to 5 latest releases online.
          #
          # - [ ] use github releases to store archived versions of doc site
          # - [ ] use relearn theme to manage a versioned doc site
          # - [ ] inject below the logic to fetch n most recent versions of the site we want to
          #   publish (from github releases), arrange the layout then complete the build
          cd hack/doc-site/hugo
          LATEST_RELEASE=$(git tag --list --sort -version:refname -i 'v*'|head -1)
          VERSION_MESSAGE="Documentation set for latest master."
          ROOT=$(git rev-parse --show-toplevel)
          REQUIRED_GO_VERSION=$(grep "^go\s" "${ROOT}"/go.mod|cut -d" " -f2)
          printf \
          "params:\n  goswagger:\n    goVersion: '%s'\n    latestRelease: '%s'\n    versionMessage: '%s'\n" \
          "${REQUIRED_GO_VERSION}" "${LATEST_RELEASE}" "${VERSION_MESSAGE}" > goswagger.yaml
      -
        name: Build site with Hugo
        uses: crazy-max/ghaction-hugo@d629f74d3e4a9da53050610da35a59863ab9b26c # v3.3.0
        with:
          version: v0.123.8  # <- pin the HUGO version, as they often break things
          extended: true
          args: >
            --config hugo.yaml,goswagger.yaml
            --buildDrafts
            --cleanDestinationDir
            --minify
            --printPathWarnings
            --ignoreCache
            --noBuildLock
            --logLevel info
            --source ${{ github.workspace }}/hack/doc-site/hugo"
      -
        name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: hack/doc-site/hugo/public

      # TODO(fredbi): should be able to render preview

  deploy-doc:
    if: ${{ github.event_name != 'pull_request' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [build-doc]
    permissions:
      pages: write
      id-token: write
    steps:
      -
        name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
